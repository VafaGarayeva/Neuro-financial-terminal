<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro-Financial Analysis Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- SƏNİN CSS KODUN BURADA --- */
        body {
            background-color: #0b0e14;
            background-image: 
                linear-gradient(rgba(18, 114, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 114, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #00ff99;
            font-family: 'Courier New', monospace;
            margin: 0; padding: 20px;
        }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .panel { background: rgba(16, 20, 28, 0.95); border: 1px solid #333; padding: 20px; border-radius: 8px; backdrop-filter: blur(10px); position: relative;}

        #brain-container.panic .brain-outline { stroke: #ff0844 !important; filter: drop-shadow(0 0 10px #ff0844); }
        #brain-container.panic #amygdala { fill: #ff0844 !important; animation: pulse 0.5s infinite; }
        #brain-container.panic #brain-text { color: #ff0844; }

        @keyframes pulse {
            0% { r: 15; opacity: 1; }
            100% { r: 35; opacity: 0.5; }
        }

        .price-row { display: flex; justify-content: space-around; margin: 15px 0; }
        .price-box { text-align: center; }
        .label { font-size: 10px; color: #888; display: block; }
        .price-val { font-size: 24px; color: #f1c40f; font-weight: bold; }
        .spread-info { font-size: 12px; text-align: center; color: #4facfe; border-top: 1px solid #222; padding-top: 5px; }

        .gauge-container { display: flex; justify-content: space-around; margin-top: 25px; }
        .gauge { width: 100px; height: 50px; position: relative; overflow: hidden; }
        .gauge-body { width: 100px; height: 100px; background: #222; border-radius: 50%; position: absolute; }
        .gauge-fill { width: 100%; height: 100%; background: #00ff99; transform-origin: center center; transform: rotate(0.08turn); transition: transform 0.5s ease; }
        .gauge-fill.reward { background: #f1c40f; }
        .gauge-cover { width: 80%; height: 80%; background: #10141c; border-radius: 50%; position: absolute; top: 10%; left: 10%; display: flex; align-items: flex-end; justify-content: center; font-size: 10px; color: #888; padding-bottom: 15px; }

        .asset-secondary { display: flex; justify-content: space-between; font-size: 13px; margin: 10px 0; color: #ccc; }
        .chart-container { height: 120px; margin-top: 10px; }
        .btn { width: 100%; padding: 15px; background: #00ff99; color: #000; border: none; cursor: pointer; font-weight: bold; }
        .trade-log { margin-top: 15px; font-size: 11px; max-height: 120px; overflow-y: auto; }
        #brain-svg { width: 100%; height: 200px; }
    </style>
</head>
<body>

<div class="dashboard">
  <div class="panel">
    <h2><i class="fas fa-brain"></i> Neuro-Status</h2>
    <div id="brain-container">
      <svg id="brain-svg" viewBox="0 0 600 500">
        <path class="brain-outline" d="M300,50 C150,50 50,150 50,250 C50,350 150,450 300,450 C450,450 550,350 550,250 C550,150 450,50 300,50 Z" fill="none" stroke="#4facfe" stroke-width="8"/>
        <circle id="amygdala" cx="300" cy="280" r="20" fill="#4facfe" />
      </svg>
      <div id="brain-text">MEDITATED</div>
    </div>

    <div class="gauge-container">
      <div class="gauge-item">
        <div class="gauge">
          <div class="gauge-body"><div id="cort-fill" class="gauge-fill"></div></div>
          <div class="gauge-cover">Cortisol</div>
        </div>
      </div>
      <div class="gauge-item">
        <div class="gauge">
          <div class="gauge-body"><div id="dop-fill" class="gauge-fill reward"></div></div>
          <div class="gauge-cover">Dopamine</div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2><i class="fas fa-chart-line"></i> Market Terminal</h2>
    <div class="asset-main">
      <div class="price-row">
        <div class="price-box">
          <span class="label">BID (Sell)</span>
          <div id="bid-price" class="price-val">--</div>
        </div>
        <div class="price-box">
          <span class="label">ASK (Buy)</span>
          <div id="ask-price" class="price-val">--</div>
        </div>
      </div>
      <div class="spread-info">Spread: <span id="spread-val">0.80</span></div>
    </div>

    <div class="asset-secondary">
      <div><i class="fas fa-oil-can"></i> Oil: $<span id="oil-price">--</span></div>
      <div><i class="fas fa-dollar-sign"></i> USD: <span id="usd-price">--</span></div>
    </div>

    <div class="chart-container">
      <canvas id="priceChart"></canvas>
    </div>
    <div id="market-status">Market is Stable</div>
  </div>

  <div class="panel">
    <h2><i class="fas fa-microchip"></i> Decision Lab</h2>
    <button class="btn" onclick="processTrade()">EXECUTE TRADE</button>
    <p id="feedback">Ready for entry...</p>
    
    <div class="trade-log">
      <h3><i class="fas fa-history"></i> Decision Log</h3>
      <ul id="log-list"></ul>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // --- SƏNİN JS KODUN BURADA ---
    let goldPrice = 2350.50;
    let oilPrice = 82.10;
    let usdAzn = 1.7000;
    let consecutiveWins = 0;
    let priceHistory = [2348, 2349, 2350, 2350.50];
    let labels = priceHistory.map(() => "");

    const canvas = document.getElementById('priceChart');
    let priceChart;
    if (canvas) {
        const ctx = canvas.getContext('2d');
        priceChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: priceHistory,
                    borderColor: '#f1c40f',
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(241, 196, 15, 0.1)',
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: {display:false}, y: {display:false} }, plugins: {legend:{display:false}} }
        });
    }

    function updateMarket() {
        let goldChange = (Math.random() - 0.5) * 8;
        goldPrice += goldChange;
        oilPrice += (Math.random() - 0.5) * 1.2;

        document.getElementById('bid-price').innerText = (goldPrice - 0.40).toFixed(2);
        document.getElementById('ask-price').innerText = (goldPrice + 0.40).toFixed(2);
        document.getElementById('oil-price').innerText = oilPrice.toFixed(2);
        document.getElementById('usd-price').innerText = usdAzn.toFixed(4);

        if (priceChart) {
            priceHistory.push(goldPrice);
            if (priceHistory.length > 20) priceHistory.shift();
            priceChart.update('none');
        }

        if (goldChange < -2.5) triggerPanic();
    }

    function triggerPanic() {
        const container = document.getElementById('brain-container');
        const brainText = document.getElementById('brain-text');
        const cortFill = document.getElementById('cort-fill');
        const status = document.getElementById('market-status');

        if (container) container.classList.add('panic');
        if (brainText) brainText.innerText = "PANIC!";
        if (status) { status.innerText = "CRASH DETECTED!"; status.style.color = "#ff0844"; }
        
        if (cortFill) {
            cortFill.style.transform = "rotate(0.45turn)";
            cortFill.style.background = "#ff0844";
        }

        setTimeout(() => {
            if (container) container.classList.remove('panic');
            if (brainText) brainText.innerText = "MEDITATED";
            if (status) { status.innerText = "Market is Stable"; status.style.color = "#00ff99"; }
            if (cortFill) {
                cortFill.style.transform = "rotate(0.08turn)";
                cortFill.style.background = "#00ff99";
            }
        }, 4000);
    }

    function processTrade() {
        consecutiveWins++;
        const logList = document.getElementById('log-list');
        const dopFill = document.getElementById('dop-fill');
        
        if (dopFill) {
            let dopVal = Math.min(consecutiveWins * 33, 100);
            dopFill.style.transform = `rotate(${dopVal/200}turn)`;
        }

        if (logList) {
            const li = document.createElement('li');
            li.innerHTML = `[${new Date().toLocaleTimeString()}] Price: $${goldPrice.toFixed(2)} | Success`;
            logList.prepend(li);
        }
    }

    setInterval(updateMarket, 1500);
</script>
</body>
</html>
