<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Multi-Asset Neuro Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #05070a; color: #00ff99; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 15px; height: 95vh; }
        .panel { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; }
        
        /* MULTI-ASSET TICKER */
        .ticker-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .ticker-card { background: #161b22; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #21262d; }
        .ticker-name { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .ticker-price { font-size: 18px; font-weight: bold; color: #f1c40f; margin: 5px 0; }
        .ticker-change { font-size: 10px; }

        /* BIOLOGY SECTION */
        .bio-stat { margin-bottom: 15px; }
        .bar-wrap { background: #161b22; height: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #30363d; position: relative; }
        .bar-inner { height: 100%; transition: 0.5s; width: 0%; }
        .bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }

        /* CHART & LOG */
        #mainChart { flex-grow: 1; max-height: 200px; }
        .log-box { background: #05070a; border-radius: 5px; flex-grow: 1; padding: 10px; font-family: monospace; font-size: 11px; overflow-y: auto; color: #8b949e; }
        
        .btn-exec { background: #00ff99; color: #05070a; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-exec:hover { filter: brightness(1.2); box-shadow: 0 0 15px rgba(0,255,153,0.3); }

        #burnout { display: none; position: fixed; inset: 0; background: rgba(255,0,0,0.3); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; color: white; text-align: center; font-size: 24px; }
    </style>
</head>
<body>

<div id="burnout">⚠️ BRAIN OVERLOAD ⚠️<br><small>Həddindən artıq stress! 5 saniyə gözləyin...</small></div>

<div class="dashboard">
    <div class="panel">
        <h3 style="font-size:14px;"><i class="fas fa-brain"></i> Neuro-Biological Status</h3>
        
        <div class="bio-stat">
            <div class="bar-label"><span>KORTİZOL (Stress)</span><span id="cort-val">15%</span></div>
            <div class="bar-wrap"><div id="cort-bar" class="bar-inner" style="background: #ff0844;"></div></div>
        </div>

        <div class="bio-stat">
            <div class="bar-label"><span>DOPAMİN (Reward)</span><span id="dop-val">20%</span></div>
            <div class="bar-wrap"><div id="dop-bar" class="bar-inner" style="background: #f1c40f;"></div></div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <div style="font-size: 10px; color: #8b949e;">AMYGDALA STATE</div>
            <div id="amy-status" style="font-size: 18px; font-weight: bold; color: #4facfe;">STABLE</div>
        </div>
    </div>

    <div class="panel">
        <div class="ticker-grid">
            <div class="ticker-card">
                <div class="ticker-name">Qızıl (XAU)</div>
                <div id="gold-price" class="ticker-price">2375.40</div>
                <div class="ticker-change" style="color:#00ff99">+0.12%</div>
            </div>
            <div class="ticker-card">
                <div class="ticker-name">Neft (Brent)</div>
                <div id="oil-price" class="ticker-price">85.20</div>
                <div class="ticker-change" style="color:#ff0844">-0.05%</div>
            </div>
            <div class="ticker-card">
                <div class="ticker-name">USD / AZN</div>
                <div id="usd-azn" class="ticker-price">1.7000</div>
                <div class="ticker-change">Sabit</div>
            </div>
        </div>

        <canvas id="mainChart"></canvas>
        
        <div style="text-align: center; margin-top: 15px;">
            <div style="font-size: 10px; color: #8b949e;">FEAR & GREED INDEX</div>
            <div id="fg-index" style="font-size: 22px; font-weight: bold; color: #4facfe;">NEUTRAL</div>
        </div>
    </div>

    <div class="panel">
        <h3 style="font-size:14px;"><i class="fas fa-microchip"></i> Decision Lab</h3>
        <button class="btn-exec" onclick="trade()">EXECUTE TRADE</button>
        
        <div style="margin-top: 15px; font-size: 11px; color: #4facfe;">> EMOTIONAL LOG</div>
        <div class="log-box" id="logs"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let gold = 2375.40, oil = 85.20, cort = 15, dop = 20, isBurnout = false;
    let history = Array(20).fill(2375);

    const ctx = document.getElementById('mainChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: history.map(()=>""), datasets: [{ data: history, borderColor: '#f1c40f', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(241,196,15,0.05)', tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x:{display:false}, y:{display:false} }, plugins: {legend:{display:false}} }
    });

    function update() {
        if(isBurnout) return;

        // Qiymət Hərəkətləri
        let goldMove = (Math.random() - 0.5) * 8;
        gold += goldMove;
        oil += (Math.random() - 0.5) * 1.2;

        // Stress Məntiqi (Qızıl düşəndə stress artır)
        if(goldMove < -3) {
            cort = Math.min(cort + 10, 100);
        } else {
            cort = Math.max(cort - 1, 10);
        }

        // Vizual Yeniləmə
        document.getElementById('gold-price').innerText = gold.toFixed(2);
        document.getElementById('oil-price').innerText = oil.toFixed(2);
        document.getElementById('cort-bar').style.width = cort + "%";
        document.getElementById('cort-val').innerText = cort + "%";
        document.getElementById('dop-bar').style.width = dop + "%";
        document.getElementById('dop-val').innerText = dop + "%";

        // Vəziyyət İndikatorları
        if(cort > 60) {
            document.getElementById('amy-status').innerText = "HYPER-ACTIVE";
            document.getElementById('amy-status').style.color = "#ff0844";
            document.getElementById('fg-index').innerText = "EXTREME FEAR";
            document.getElementById('fg-index').style.color = "#ff0844";
        } else {
            document.getElementById('amy-status').innerText = "STABLE";
            document.getElementById('amy-status').style.color = "#4facfe";
            document.getElementById('fg-index').innerText = dop > 60 ? "GREED" : "NEUTRAL";
            document.getElementById('fg-index').style.color = dop > 60 ? "#f1c40f" : "#4facfe";
        }

        if(cort >= 98) {
            isBurnout = true;
            document.getElementById('burnout').style.display = 'flex';
            setTimeout(() => { isBurnout = false; cort = 30; document.getElementById('burnout').style.display = 'none'; }, 5000);
        }

        history.push(gold);
        history.shift();
        chart.update('none');
    }

    function trade() {
        if(isBurnout) return;
        dop = Math.min(dop + 15, 100);
        let log = document.getElementById('logs');
        let entry = document.createElement('div');
        let status = cort > 60 ? "<span style='color:#ff0844'>[PANIC]</span>" : "<span style='color:#00ff99'>[ZEN]</span>";
        entry.innerHTML = `[${new Date().toLocaleTimeString()}] Gold: $${gold.toFixed(2)} ${status}`;
        log.prepend(entry);
        setTimeout(() => { dop = Math.max(dop - 5, 10); }, 3000);
    }

    setInterval(update, 1500);
</script>
</body>
</html>
