<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Neuro-Finance Fix Terminal</title>
    <style>
        body { background: #05070a; color: #00ff99; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        .dashboard { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px; height: 90vh; }
        .panel { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        
        /* ASSETS */
        .asset-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #161b22; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #21262d; }
        .val { font-size: 22px; font-weight: bold; color: #f1c40f; }

        /* BIOLOGY */
        .bar-container { background: #05070a; height: 25px; border-radius: 12px; border: 1px solid #333; position: relative; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s; }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 25px; font-size: 12px; font-weight: bold; color: #fff; }

        /* MODES */
        .mode-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 10px; background: #161b22; color: #8b949e; border: 1px solid #333; cursor: pointer; border-radius: 6px; }
        .btn.active { background: #4facfe; color: #fff; border-color: #4facfe; }

        /* LOGS */
        #logs { flex-grow: 1; background: #05070a; border: 1px solid #222; padding: 15px; font-family: monospace; font-size: 12px; overflow-y: auto; color: #8b949e; border-radius: 8px; }
        
        .trade-btn { background: #00ff99; color: #05070a; border: none; padding: 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 15px; }

        #burnout { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; text-align: center; color: #ff0844; }
    </style>
</head>
<body>

<div id="burnout">
    <div><h1>⚠️ SYSTEM OVERLOAD ⚠️</h1><p>Stress limitini keçdiniz. 5 saniyə istirahət edin...</p></div>
</div>

<div class="dashboard">
    <div class="panel">
        <h2 style="color:#4facfe">Condition</h2>
        <div class="mode-buttons">
            <button class="btn active" onclick="changeMode('zen', this)">ZEN</button>
            <button class="btn" onclick="changeMode('sleep', this)">NO SLEEP</button>
            <button class="btn" onclick="changeMode('caffeine', this)">CAFFEINE</button>
        </div>

        <p>CORTISOL (Stress)</p>
        <div class="bar-container">
            <div id="c-bar" class="bar-fill" style="background:#ff0844"></div>
            <div id="c-txt" class="bar-label">0%</div>
        </div>

        <p>DOPAMINE (Reward)</p>
        <div class="bar-container">
            <div id="d-bar" class="bar-fill" style="background:#f1c40f"></div>
            <div id="d-txt" class="bar-label">0%</div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <small>FEAR & GREED</small>
            <div id="fg-index" style="font-size: 24px; font-weight: bold;">NEUTRAL</div>
        </div>
    </div>

    <div class="panel">
        <div class="asset-row">
            <div class="card"><small>GOLD</small><div id="p-gold" class="val">2375.00</div></div>
            <div class="card"><small>OIL</small><div id="p-oil" class="val">81.50</div></div>
            <div class="card"><small>USD/AZN</small><div class="val">1.7000</div></div>
        </div>
        
        <div style="flex-grow:1; border:1px dashed #333; display:flex; align-items:center; justify-content:center; color:#333; position:relative;">
            <canvas id="miniChart" style="width:100%; height:100%;"></canvas>
            <div style="position:absolute; bottom:10px; font-size:12px;">Market Terminal Live Feed</div>
        </div>
    </div>

    <div class="panel">
        <h2 style="color:#4facfe">Decision Log</h2>
        <div id="logs"></div>
        <button class="trade-btn" onclick="makeTrade()">EXECUTE TRADE</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let gold = 2375, oil = 81.5, cort = 15, dop = 20, mode = 'zen', isLocked = false;
    let chartPrices = Array(20).fill(2375);

    // Qrafik Parametrləri
    const ctx = document.getElementById('miniChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: chartPrices.map(()=>""), datasets: [{ data: chartPrices, borderColor: '#00ff99', borderWidth: 3, pointRadius: 0, fill: true, backgroundColor: 'rgba(0,255,153,0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x:{display:false}, y:{display:false} }, plugins: {legend:{display:false}} }
    });

    function changeMode(m, btn) {
        mode = m;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        addLog(`System: Mode switched to ${m.toUpperCase()}`);
    }

    function engine() {
        if(isLocked) return;

        let move = (Math.random() - 0.5) * 10;
        gold += move; oil += (Math.random() - 0.5) * 1.2;

        // Məntiq
        let factor = (mode === 'sleep' ? 2.8 : (mode === 'zen' ? 0.4 : 1));
        if(move < -3.5) cort = Math.min(cort + (5 * factor), 100);
        else cort = Math.max(cort - 1.2, 10);

        // Vizual Yeniləmə
        document.getElementById('p-gold').innerText = gold.toFixed(2);
        document.getElementById('p-oil').innerText = oil.toFixed(2);
        document.getElementById('c-bar').style.width = cort + "%";
        document.getElementById('c-txt').innerText = Math.round(cort) + "%";
        document.getElementById('d-bar').style.width = dop + "%";
        document.getElementById('d-txt').innerText = Math.round(dop) + "%";

        // Fear/Greed
        let fg = document.getElementById('fg-index');
        if(cort > 65) { fg.innerText = "FEAR"; fg.style.color = "#ff0844"; }
        else if(dop > 70) { fg.innerText = "GREED"; fg.style.color = "#f1c40f"; }
        else { fg.innerText = "NEUTRAL"; fg.style.color = "#4facfe"; }

        // Burnout
        if(cort >= 96) {
            isLocked = true;
            document.getElementById('burnout').style.display = 'flex';
            setTimeout(() => { isLocked = false; cort = 30; document.getElementById('burnout').style.display = 'none'; }, 5000);
        }

        chartPrices.push(gold); chartPrices.shift(); chart.update('none');
    }

    function makeTrade() {
        if(isLocked) return;
        dop = Math.min(dop + 15, 100);
        let status = cort > 70 ? "<span style='color:#ff0844'>[PANIC DETECTED!]</span>" : (dop > 75 ? "<span style='color:#f1c40f'>[RISKY MOVE!]</span>" : "[RATIONAL]");
        addLog(`Trade: $${gold.toFixed(2)} ${status}`);
        setTimeout(() => { dop = Math.max(dop - 8, 20); }, 2500);
    }

    function addLog(msg) {
        let box = document.getElementById('logs');
        let d = document.createElement('div');
        d.innerHTML = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
        box.prepend(d);
    }

    setInterval(engine, 1500);
</script>
</body>
</html>
